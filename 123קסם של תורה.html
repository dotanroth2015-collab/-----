<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- תג אימות הבעלות עבור גוגל -->
    <meta name="google-site-verification" content="JtqXPIJ3P2gSdkt0msF0w5FgnGuVv8eu5sf7PZMaq9g" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קסם של תורה - כניסה לאתר</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 4rem;
            color: #1a2a3a;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-link {
            display: inline-block;
            text-decoration: none;
            color: #ffffff !important;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 35px 70px;
            font-size: 3rem;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(30, 60, 114, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
        }

        .btn-link:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(30, 60, 114, 0.5);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .btn-link { font-size: 2rem; padding: 25px 50px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>קסם של תורה</h1>
        <p>לחצו למעבר לאתר הלימוד</p>
        
        <a href="https://base44.app" class="btn-link">
            לחצו פה
        </a>
    </div>

</body>
</html>
