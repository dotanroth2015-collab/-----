<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כרטיס אורח</title>
  <style>
    :root{--bg:#eef4f3;--panel:#fff;--ink:#1f2933;--muted:#697586;--line:#d8e0de;--primary:#0f766e;--dark:#17313b;--gold:#c8963e;--danger:#b42318;--shadow:0 16px 38px rgba(31,41,51,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:Arial,"Noto Sans Hebrew",sans-serif}button,input{font:inherit}button{cursor:pointer}header{padding:18px 22px;background:var(--dark);color:#fff;border-bottom:4px solid var(--gold)}h1,h2{margin:0}.wrap{width:min(760px,100%);margin:auto;padding:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}.head{padding:18px;background:#fbfaf8;border-bottom:1px solid var(--line)}.body{padding:18px;display:grid;gap:14px}.field{display:grid;gap:6px;color:var(--muted);font-size:13px;font-weight:800}.control{width:100%;height:44px;border:1px solid var(--line);border-radius:8px;padding:0 12px;outline:none}.btn{min-height:46px;border:0;border-radius:8px;padding:0 14px;font-weight:900}.primary{background:var(--primary);color:#fff}.secondary{background:#e9e2d7;color:var(--ink)}.card{min-height:220px;border-radius:8px;padding:22px;color:#fff;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.22),transparent 28%),linear-gradient(135deg,#17313b,#0f766e 62%,#c8963e);display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}.card small{color:rgba(255,255,255,.78);font-weight:800}.number{direction:ltr;text-align:left;letter-spacing:2px;font-size:19px;font-weight:900}.balance{font-size:36px;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.nfc{border:1px dashed #9bbdb7;border-radius:8px;background:#f7fbfa;padding:14px;color:var(--muted);line-height:1.55}.pulse{border-color:#0f766e;background:#e8f3f1;color:#115e59;font-weight:900}.hidden{display:none}.toast{position:fixed;left:22px;bottom:22px;background:var(--dark);color:#fff;padding:13px 16px;border-radius:8px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.16s;pointer-events:none;font-weight:800}.toast.show{opacity:1;transform:none}@media(max-width:620px){.grid{grid-template-columns:1fr}.wrap{padding-inline:14px}}
  </style>
</head>
<body>
<header><h1>כרטיס אורח למסעדה</h1><div>פותחים עם קוד אישי. כשמצמידים לקופה, התשלום יורד לבד.</div></header>
<main class="wrap">
  <section class="panel" id="loginPanel"><div class="head"><h2>כניסה לכרטיס שלי</h2></div><form class="body" id="loginForm"><label class="field">קוד אתר אישי<input class="control" id="accessCode" inputmode="numeric" placeholder="לדוגמה: 1001" required></label><button class="btn primary" type="submit">כניסה</button><div class="nfc">את הקוד מקבלים מהקופה במסך ניהול האורחים.</div></form></section>
  <section class="hidden" id="portal">
    <div class="card"><div><small>כרטיס אורח</small><div class="number" id="cardNumber">0000 0000 0000 0000</div></div><div><small id="guestName">אורח</small><div class="balance" id="balance">₪0</div></div></div>
    <section class="panel"><div class="head"><h2>טעינת כסף</h2></div><form class="body" id="topupForm"><div class="grid"><label class="field">סכום טעינה ₪<input class="control" id="topupAmount" type="number" min="1" value="50" required></label><label class="field">4 ספרות אשראי<input class="control" id="last4" inputmode="numeric" maxlength="4" placeholder="1234" required></label></div><button class="btn primary" type="submit">טעינה לכרטיס</button><div class="nfc">זה דמו מקומי. סליקת אשראי אמיתית דורשת שרת וחברת סליקה.</div></form></section>
    <section class="panel"><div class="head"><h2>תשלום NFC אוטומטי</h2></div><div class="body"><div class="nfc" id="nfcStatus">אין כרגע תשלום פתוח בקופה.</div><button class="btn secondary" id="refresh" type="button">רענון מצב קופה</button></div></section>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
const defaultGuests=[{id:1,name:"אורח לדוגמה",card:"7777 1201 4500 1001",accessCode:"1001",balance:120}];let guests=load("restaurantGuests",defaultGuests),activeId=null,lastPaidOrderId=null;const $=id=>document.getElementById(id),money=n=>new Intl.NumberFormat("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}).format(Math.max(0,Number(n)||0));function load(k,f){try{const v=JSON.parse(localStorage.getItem(k));return Array.isArray(v)&&v.length?v:structuredClone(f)}catch{return structuredClone(f)}}function save(){localStorage.setItem("restaurantGuests",JSON.stringify(guests))}function pending(){try{return JSON.parse(localStorage.getItem("restaurantPendingNfc"))}catch{return null}}function setCompleted(p){localStorage.setItem("restaurantCompletedNfc",JSON.stringify(p))}function clearPending(){localStorage.removeItem("restaurantPendingNfc")}function toast(t){$("toast").textContent=t;$("toast").classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>$("toast").classList.remove("show"),2400)}function active(){return guests.find(g=>g.id===activeId)}
function render(){const g=active();if(!g)return;$("loginPanel").classList.add("hidden");$("portal").classList.remove("hidden");$("cardNumber").textContent=g.card;$("guestName").textContent=`${g.name} · קוד ${g.accessCode}`;$("balance").textContent=money(g.balance);const p=pending();$("nfcStatus").classList.toggle("pulse",Boolean(p));$("nfcStatus").textContent=p?`זוהה מסוף קופה לתשלום ${money(p.amount)}. מצמידים את הטלפונים והתשלום מבוצע אוטומטית...`:"אין כרגע תשלום פתוח בקופה."}
function autoPay(){if(!activeId)return;guests=load("restaurantGuests",defaultGuests);const g=guests.find(x=>x.id===activeId),p=pending();if(!g||!p||p.orderId===lastPaidOrderId)return;if(g.balance<p.amount){$("nfcStatus").classList.add("pulse");$("nfcStatus").textContent=`אין מספיק יתרה לתשלום ${money(p.amount)}. טען כסף לכרטיס.`;return}lastPaidOrderId=p.orderId;g.balance-=p.amount;setCompleted({orderId:p.orderId,amount:p.amount,guestId:g.id,guestName:g.name,paidAt:Date.now()});clearPending();save();activeId=g.id;render();toast(`שולם אוטומטית לקופה: ${money(p.amount)}`)}
$("loginForm").onsubmit=e=>{e.preventDefault();guests=load("restaurantGuests",defaultGuests);const code=$("accessCode").value.trim(),g=guests.find(x=>x.accessCode===code);if(!g)return toast("קוד לא נמצא");activeId=g.id;render();toast(`שלום ${g.name}`);autoPay()};$("topupForm").onsubmit=e=>{e.preventDefault();const g=active(),amount=Math.round(+$("topupAmount").value||0),last4=$("last4").value.trim();if(!g||amount<=0||last4.length!==4)return toast("צריך סכום ו-4 ספרות אשראי");g.balance+=amount;save();render();toast(`נטענו ${money(amount)} לכרטיס`);autoPay()};$("refresh").onclick=()=>{render();autoPay()};setInterval(()=>{if(activeId){render();autoPay()}},900);
</script>
</body>
</html>
