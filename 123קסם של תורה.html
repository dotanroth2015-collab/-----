<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעבר לאתר קסם של תורה</title>
    <style>
        /* מרכז את כל התוכן לאמצע המסך */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9; /* צבע רקע נקי */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .wrapper {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem; /* כותרת ענקית */
            color: #1a2a3a;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .btn-magic {
            display: inline-block;
            text-decoration: none;
            color: #ffffff !important;
            background: linear-gradient(145deg, #2c3e50, #34495e); /* צבע כחול כהה מלכותי */
            padding: 30px 60px; /* כפתור גדול מאוד */
            font-size: 2.5rem; /* טקסט בתוך הכפתור גדול מאוד */
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 2px solid #1a2a3a;
        }

        /* אפקט כשמעבירים עכבר */
        .btn-magic:hover {
            transform: scale(1.1); /* מגדיל את הכפתור עוד יותר כשנוגעים בו */
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
            background: linear-gradient(145deg, #34495e, #2c3e50);
        }

        /* מותאם לנייד */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .btn-magic { font-size: 1.8rem; padding: 20px 40px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>קסם של תורה</h1>
        
        <a href="https://app-f2e6b9bf.base44.app/login?from_url=https%3A%2F%2Fapp-f2e6b9bf.base44.app%2F" class="btn-magic">
            לחצו פה למעבר לאתר
        </a>
    </div>

</body>
</html>
